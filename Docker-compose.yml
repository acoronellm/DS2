services:

  # =========================
  # TRAEFIK
  # =========================
  traefik:
    image: traefik:v3.1
    container_name: traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    networks:
      - app-network

  # =========================
  # POSTGRES (HEALTHCHECK)
  # =========================
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: personas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - app-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d personas_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # =========================
  # MINIO (HEALTHCHECK)
  # =========================
  minio:
    image: minio/minio
    container_name: minio_storage
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always
    networks:
      - app-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app-network
    entrypoint: >
      /bin/sh -c "
      echo 'Esperando MinIO...';
      until mc alias set local http://minio:9000 admin admin123; do
        sleep 2;
      done;
      mc mb local/fotos-personas || true;
      mc anonymous set public local/fotos-personas;
      echo 'Bucket listo';
      "

  # =========================
  # MICROSERVICIOS
  # =========================
  op-create:
    build: ./op-create
    container_name: op-create
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=development
      - AUTH_SERVICE_URL=http://auth-service:5002
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  op-update:
    build: ./op-update
    container_name: op-update
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  op-read:
    build: ./op-read
    container_name: op-read
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  op-delete:
    build: ./op-delete
    container_name: op-delete
    ports:
      - "5005:5005"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "5002:5002"
    environment:
      - FLASK_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - app-network

  # =========================
  # N8N
  # =========================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"

    volumes:
      - ./n8n/workflows:/workflows
      - ./n8n/credentials.json:/credentials.json
      - ./n8n/init.sh:/init.sh
      - n8n_data:/home/node/.n8n

    environment:
      - N8N_ENCRYPTION_KEY=clave123
      - N8N_RUNNERS_ENABLED=true

    entrypoint: /bin/sh
    command: /init.sh

    depends_on:
      postgres:
        condition: service_healthy

    restart: always
    networks:
      - app-network

  # =========================
  # PLATAFORMA
  # =========================
  plataforma:
    build: ./plataforma
    container_name: plataforma
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: always
    networks:
      - app-network

# =========================
# VOLUMENES
# =========================
volumes:
  postgres_data:
  minio_data:
  n8n_data:

networks:
  app-network:
    driver: bridge