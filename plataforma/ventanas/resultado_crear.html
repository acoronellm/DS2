<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Resultado creación</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='estilos/styles.css') }}"
    />
  </head>
  <body>
    <div class="dashboard-page">
      <div class="dashboard-card">
        <input type="checkbox" id="sidebarToggle" class="sidebar-toggle" />

        <aside class="sidebar collapsed">
          <label for="sidebarToggle" class="toggle-btn">↗</label>

          <nav class="sidebar-menu">
            {% if rol_usuario == "admin" %}
            <a href="/menu"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/casa.png') }}"
                class="menu-icon"
              /><span class="menu-text">Panel principal</span></a
            >
            <a href="/formulario_crear"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/Imagen4.png') }}"
                class="menu-icon"
              /><span class="menu-text">Crear persona</span></a
            >
            <a href="/formulario_actualizar"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/editar.png') }}"
                class="menu-icon"
              /><span class="menu-text">Actualizar persona</span></a
            >
            <a href="/formulario_consultar"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/buscar_persona.png') }}"
                class="menu-icon"
              /><span class="menu-text">Consultar persona</span></a
            >
            <a href="/formulario_eliminar"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/eliminar.png') }}"
                class="menu-icon"
              /><span class="menu-text">Eliminar persona</span></a
            >
            <a href="/llamado_logs"
              ><img
                src="{{ url_for('static', filename='estilos/iconos/buscar.png') }}"
                class="menu-icon"
              /><span class="menu-text">Vista de logs</span></a
            >
            {% endif %}
          </nav>
          <form action="/logout" method="post" class="logout-form">
            <button type="submit" title="Cerrar sesión">
              <img
                src="{{ url_for('static', filename='estilos/iconos/salida.png') }}"
                class="menu-icon"
              />
              <span class="menu-text">Cerrar sesión</span>
            </button>
          </form>
        </aside>

        <main class="dashboard-content">
          <div class="topbar">
            <div>
              <h1>Resultado de creación</h1>
              <p>Respuesta del sistema</p>
            </div>
          </div>

          <section class="create-result-box">
            <div class="create-result-card">
              <img
                src="{{ url_for('static', filename='estilos/iconos/Imagen4.png') }}"
                class="create-result-icon"
              />

              <h2>Proceso finalizado</h2>

              <div class="result-message success-result-message">
                <p>{{ mensaje }}</p>
              </div>

              <div class="create-result-actions">
                <a href="{{ url_for('formulario_crear') }}" class="primary-btn"
                  >Crear otra persona</a
                >
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>
  </body>
</html>
