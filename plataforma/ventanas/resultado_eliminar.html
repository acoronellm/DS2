<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultado eliminación</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='estilos/styles.css') }}">
</head>
<body>

<div class="dashboard-page">
    <div class="dashboard-card">

        <input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

        <aside class="sidebar collapsed">
            <label for="sidebarToggle" class="toggle-btn">↗</label>

            <nav class="sidebar-menu">
                <a href="/menu" title="Panel principal">
                    <img src="{{ url_for('static', filename='estilos/iconos/casa.png') }}" class="menu-icon">
                    <span class="menu-text">Panel principal</span>
                </a>

                <a href="/formulario_crear" title="Crear persona">
                    <img src="{{ url_for('static', filename='estilos/iconos/Imagen4.png') }}" class="menu-icon">
                    <span class="menu-text">Crear persona</span>
                </a>

                <a href="/formulario_actualizar" title="Actualizar persona">
                    <img src="{{ url_for('static', filename='estilos/iconos/editar.png') }}" class="menu-icon">
                    <span class="menu-text">Actualizar persona</span>
                </a>

                <a href="/formulario_consultar" title="Consultar persona">
                    <img src="{{ url_for('static', filename='estilos/iconos/buscar_persona.png') }}" class="menu-icon">
                    <span class="menu-text">Consultar persona</span>
                </a>

                <a href="/formulario_eliminar" title="Eliminar persona">
                    <img src="{{ url_for('static', filename='estilos/iconos/eliminar.png') }}" class="menu-icon">
                    <span class="menu-text">Eliminar persona</span>
                </a>

                <a href="/llamado_logs" title="Vista de logs">
                    <img src="{{ url_for('static', filename='estilos/iconos/buscar.png') }}" class="menu-icon">
                    <span class="menu-text">Vista de logs</span>
                </a>
            </nav>
        </aside>

        <main class="dashboard-content">

            <div class="topbar">
                <div>
                    <h1>Resultado de eliminación</h1>
                    <p>Respuesta del sistema</p>
                </div>
            </div>

            <section class="delete-result-box">
                <div class="delete-result-card">
                    <img src="{{ url_for('static', filename='estilos/iconos/eliminar.png') }}" class="delete-main-icon">

                    <h2>Proceso finalizado</h2>

                    <div class="result-message">
                        <p>{{ mensaje }}</p>
                    </div>

                    <div class="delete-result-actions">
                        <a href="{{ url_for('formulario_eliminar') }}" class="primary-btn">Eliminar otra persona</a>
                    </div>
                </div>
            </section>

        </main>

    </div>
</div>

</body>
</html>
